<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StudyForge Pro - 离线</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #eef2ff 0%, #e0e7ff 100%);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif;
      color: #1e293b;
    }
    .container {
      text-align: center;
      padding: 3rem 2rem;
      max-width: 480px;
    }
    .icon {
      width: 96px;
      height: 96px;
      margin: 0 auto 1.5rem;
      opacity: 0.6;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: #4f46e5;
      margin-bottom: 0.75rem;
    }
    .subtitle {
      font-size: 1rem;
      color: #64748b;
      line-height: 1.6;
      margin-bottom: 1.5rem;
    }
    .btn {
      display: inline-block;
      padding: 0.75rem 2rem;
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 0.5rem;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn:hover { background: #4338ca; }
    .features {
      margin-top: 2rem;
      text-align: left;
      background: rgba(255,255,255,0.7);
      border-radius: 12px;
      padding: 1.25rem 1.5rem;
      border: 1px solid rgba(79, 70, 229, 0.1);
    }
    .features h2 {
      font-size: 0.85rem;
      font-weight: 600;
      color: #4f46e5;
      margin-bottom: 0.75rem;
      text-align: center;
    }
    .feature-list {
      list-style: none;
    }
    .feature-list li {
      font-size: 0.85rem;
      color: #475569;
      padding: 0.35rem 0;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .feature-list li .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .dot-green { background: #22c55e; }
    .dot-red { background: #ef4444; }
    .hint {
      margin-top: 1.5rem;
      font-size: 0.85rem;
      color: #94a3b8;
    }
    .status-bar {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.4rem 0.8rem;
      border-radius: 999px;
      font-size: 0.8rem;
      font-weight: 500;
      margin-bottom: 1.5rem;
    }
    .status-offline {
      background: #fef3c7;
      color: #92400e;
    }
    .pulse-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #f59e0b;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
  </style>
</head>
<body>
  <div class="container">
    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="#4f46e5" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M1 1l22 22"/>
      <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/>
      <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/>
      <path d="M10.71 5.05A16 16 0 0 1 22.56 9"/>
      <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/>
      <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
      <line x1="12" y1="20" x2="12.01" y2="20"/>
    </svg>

    <div class="status-bar status-offline">
      <span class="pulse-dot"></span>
      离线中 — 正在等待网络连接
    </div>

    <h1>当前处于离线状态</h1>
    <p class="subtitle">StudyForge Pro 已缓存您之前加载的学习数据。<br/>部分功能可以在离线状态下正常使用。</p>

    <button class="btn" onclick="window.location.reload()">重新连接</button>

    <div class="features">
      <h2>离线功能状态</h2>
      <ul class="feature-list">
        <li><span class="dot dot-green"></span>学习看板 (已缓存数据)</li>
        <li><span class="dot dot-green"></span>知识卡片浏览与复习</li>
        <li><span class="dot dot-green"></span>知识笔记本查看与编辑</li>
        <li><span class="dot dot-green"></span>练习题回顾</li>
        <li><span class="dot dot-green"></span>学习报告与统计</li>
        <li><span class="dot dot-red"></span>AI 对话 (需要网络)</li>
        <li><span class="dot dot-red"></span>上传材料 (需要网络)</li>
        <li><span class="dot dot-red"></span>模拟考试生成 (需要网络)</li>
      </ul>
    </div>

    <p class="hint">网络恢复后页面将自动刷新，排队操作将自动同步</p>
  </div>
  <script>
    window.addEventListener('online', () => {
      window.location.reload()
    })
  </script>
</body>
</html>
